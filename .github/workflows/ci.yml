name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      # The suite mocks all AMQP and database boundaries, so no services are required.
      # The script detects the SDK provided by setup-dotnet and skips its own bootstrap.
      - run: ./scripts/run-tests.sh
